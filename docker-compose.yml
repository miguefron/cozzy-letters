services:
  postgres:
    image: postgres:16
    container_name: cozyletters-db
    environment:
      POSTGRES_DB: cozyletters
      POSTGRES_USER: cozyletters
      POSTGRES_PASSWORD: cozyletters
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cozyletters -d cozyletters"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cozyletters-net

volumes:
  pgdata:

networks:
  cozyletters-net:
    driver: bridge
