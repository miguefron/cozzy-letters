<!DOCTYPE html>
<html>
<head><title>SSE Test</title></head>
<body style="font-family:monospace;padding:20px;background:#FFF8F0">
<h2>SSE Connection Test</h2>
<div id="log" style="white-space:pre-wrap;background:#fff;padding:10px;border:1px solid #ccc;min-height:300px;max-height:600px;overflow:auto"></div>
<script>
function log(msg) {
  var el = document.getElementById('log');
  el.textContent += new Date().toISOString().substr(11,12) + ' ' + msg + '\n';
  el.scrollTop = el.scrollHeight;
}

var raw = localStorage.getItem('cl_token');
if (!raw) {
  log('ERROR: No cl_token in localStorage. Log in first, then reload this page.');
} else {
  var token = JSON.parse(raw);
  log('Token found: ' + token.substring(0, 20) + '...');

  var apiBase = 'http://cozyletters.mooo.com:8080/api';
  var url = apiBase + '/sse/subscribe?token=' + encodeURIComponent(token);
  log('Connecting to: ' + url.substring(0, 80) + '...');
  log('Creating EventSource...');

  var es = new EventSource(url);

  es.onopen = function() {
    log('OPEN - readyState: ' + es.readyState);
  };

  es.onerror = function(e) {
    log('ERROR - readyState: ' + es.readyState + ' (0=CONNECTING, 1=OPEN, 2=CLOSED)');
  };

  es.onmessage = function(e) {
    log('MESSAGE (default): ' + e.data);
  };

  es.addEventListener('connected', function(e) {
    log('EVENT[connected]: ' + e.data);
  });

  es.addEventListener('ping', function(e) {
    log('EVENT[ping]: ' + e.data);
  });

  es.addEventListener('new_letter', function(e) {
    log('EVENT[new_letter]: ' + e.data);
    try {
      var parsed = JSON.parse(e.data);
      log('  Parsed OK: sender=' + parsed.senderName + ', title=' + parsed.title);
    } catch(err) {
      log('  Parse ERROR: ' + err.message);
    }
  });

  log('EventSource created, waiting for events...');
  log('(Send a letter to this account from another session to test)');
}
</script>
</body>
</html>
