<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Envelope body -->
  <rect x="2" y="8" width="28" height="20" rx="3" fill="#D4A574"/>
  <!-- Inner shadow -->
  <rect x="3" y="9" width="26" height="18" rx="2.5" fill="#C89B6E"/>
  <!-- Letter peeking out -->
  <rect x="6" y="5" width="20" height="16" rx="2" fill="#FDF6EC"/>
  <line x1="9" y1="9" x2="23" y2="9" stroke="#D4A574" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="9" y1="12" x2="20" y2="12" stroke="#D4A574" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="9" y1="15" x2="17" y2="15" stroke="#D4A574" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
  <!-- Envelope flap (V shape) -->
  <path d="M2 8 L16 20 L30 8" fill="none" stroke="#BF9060" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Bottom V fold -->
  <path d="M2 28 L16 18 L30 28" fill="#D4A574" stroke="#BF9060" stroke-width="0.5"/>
  <!-- Wax seal -->
  <circle cx="16" cy="22" r="4" fill="#C4756B"/>
  <circle cx="16" cy="22" r="2.5" fill="none" stroke="#A85F55" stroke-width="1"/>
  <!-- Heart on seal -->
  <path d="M14.8 21.2 C14.8 20.5 15.4 20 16 20.6 C16.6 20 17.2 20.5 17.2 21.2 C17.2 22 16 23 16 23 C16 23 14.8 22 14.8 21.2Z" fill="#A85F55"/>
</svg>
